<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta para Madu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="coracoes"></div>

<div class="envelope" onclick="abrirCarta()">
    <div class="carta">
        <h2>Para a minha melhor amiga 💖</h2>
        <p>Querida Madu,</p>
        <p>Você é a melhor pessoa que eu conheci. Eu sou muito grata por ter você na minha vida.</p>
        <p>Com amor,</p>
        <p>Thaís</p>
    </div>

    <div class="aba-esquerda"></div>
    <div class="aba-direita"></div>
    <div class="aba-baixo"></div>
    <div class="tampa"></div>
</div>

<p class="aviso">Clique no envelope 💌</p>

<script src="script.js"></script>
</body>
</html>
